<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightning &mdash; Team Registry</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
::selection { background: rgba(126,200,227,0.3); }

body {
  font-family: 'Inter', sans-serif;
  background: #0a0a1a;
  color: #fff;
  min-height: 100vh;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 48px;
}
.header img { height: 40px; margin-bottom: 16px; }
.header h1 {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #7EC8E3, #A78BFA);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.header p {
  color: rgba(255,255,255,0.6);
  font-size: 0.95rem;
  max-width: 500px;
  margin: 0 auto;
}

/* Reward banner */
.reward-banner {
  background: linear-gradient(135deg, rgba(126,200,227,0.15), rgba(167,139,250,0.15));
  border: 1px solid rgba(126,200,227,0.3);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 40px;
  text-align: center;
}
.reward-banner h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: #7EC8E3;
  margin-bottom: 12px;
}
.reward-tiers {
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
}
.reward-tier {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 16px 20px;
  min-width: 200px;
}
.reward-tier .threshold {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.reward-tier .prize {
  font-size: 0.95rem;
  font-weight: 600;
  color: #fff;
}

/* Team cards */
.teams {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 40px;
}
@media (max-width: 640px) {
  .teams { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .add-helper-form { flex-direction: column; }
  .add-helper-form select, .add-helper-form input { min-width: 100%; }
.add-helper-form select:focus, .add-helper-form input:focus {
  outline: none;
  border-color: #7EC8E3;
  box-shadow: 0 0 0 2px rgba(126,200,227,0.2);
}
  .reward-tiers { flex-direction: column; align-items: center; }
}

.team-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 28px;
  transition: border-color 0.3s;
}
.team-card:hover {
  border-color: rgba(126,200,227,0.3);
}
.team-card.leading {
  border-color: rgba(126,200,227,0.4);
  background: linear-gradient(135deg, rgba(126,200,227,0.08), rgba(167,139,250,0.05));
}

.team-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.team-name {
  font-size: 1.4rem;
  font-weight: 800;
}
.team-badge {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 700;
}
.team-badge.leader { background: rgba(126,200,227,0.2); color: #7EC8E3; }
.team-badge.trailing { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }

.team-count {
  font-size: 3rem;
  font-weight: 800;
  margin-bottom: 4px;
  line-height: 1;
}
.team-count-label {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.5);
  margin-bottom: 16px;
}

/* Progress bar */
.progress-track {
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  background: linear-gradient(90deg, #7EC8E3, #A78BFA);
}
.progress-label {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.4);
  text-align: right;
}

/* Helpers section */
.helpers-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.helpers-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.4);
  margin-bottom: 10px;
}
.helper-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
}
.helper-name {
  font-size: 0.9rem;
  font-weight: 500;
}
.helper-count {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.5);
  font-weight: 600;
}
.no-helpers {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.3);
  font-style: italic;
}

/* QR section */
.qr-section {
  text-align: center;
  margin-top: 48px;
  padding: 32px;
  background: rgba(255,255,255,0.03);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
}
.qr-section h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.qr-section p {
  color: rgba(255,255,255,0.5);
  font-size: 0.85rem;
  margin-bottom: 24px;
}
.qr-grid {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}
.qr-item {
  text-align: center;
}
.qr-item canvas {
  border-radius: 12px;
  background: #fff;
  padding: 12px;
}
.qr-label {
  margin-top: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
}

/* Recent signups */
.recent-section {
  margin-top: 40px;
}
.recent-section h3 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: rgba(255,255,255,0.7);
}
.recent-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.recent-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  font-size: 0.85rem;
}
.recent-email { color: rgba(255,255,255,0.7); }
.recent-ref { color: #7EC8E3; font-weight: 600; }
.recent-time { color: rgba(255,255,255,0.3); font-size: 0.75rem; }

/* Add helper form */
.add-helper-section {
  margin-top: 40px;
  padding: 24px;
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
}
.add-helper-section h3 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 16px;
}
.add-helper-form {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.add-helper-form select,
.add-helper-form input {
  flex: 1;
  min-width: 140px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #fff;
  font-size: 0.9rem;
  font-family: inherit;
}
.add-helper-form select option { background: #1a1a2e; }
.add-helper-form button {
  padding: 10px 24px;
  background: linear-gradient(135deg, #7EC8E3, #A78BFA);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: opacity 0.2s;
}
.add-helper-form button:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(126,200,227,0.3);
}
.add-helper-form button:active {
  transform: translateY(0);
}
.add-helper-form button:hover { opacity: 0.85; }

/* Loading state */
.loading {
  text-align: center;
  padding: 60px;
  color: rgba(255,255,255,0.4);
}
.loading-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #7EC8E3;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Auto-refresh indicator */
.refresh-bar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  gap: 6px;
}
.refresh-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.jacket-showcase {
  margin-top: 40px;
  padding: 30px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
}
.jacket-showcase h2 {
  text-align: center;
  font-size: 1.5rem;
  margin-bottom: 8px;
  color: #fff;
}
.jacket-showcase .showcase-subtitle {
  text-align: center;
  color: rgba(255,255,255,0.6);
  margin-bottom: 24px;
  font-size: 0.95rem;
}
.jacket-cards {
  display: flex;
  gap: 24px;
  justify-content: center;
  flex-wrap: wrap;
}
.jacket-card {
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  overflow: hidden;
  width: 280px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  border: 1px solid rgba(255,255,255,0.1);
  text-decoration: none;
  color: inherit;
  display: block;
}
.jacket-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.jacket-card img { width: 100%; height: auto; object-fit: cover; background: #f5f0eb; }
.jacket-info {
  padding: 16px;
}
.jacket-info h3 {
  font-size: 1rem;
  margin: 0 0 6px 0;
  color: #fff;
}
.jacket-info .jacket-price {
  font-size: 0.9rem;
  color: #7EC8E3;
}
.jacket-info .jacket-price .original {
  text-decoration: line-through;
  color: rgba(255,255,255,0.4);
  margin-right: 8px;
}
.jacket-info .jacket-sale {
  display: inline-block;
  background: #7EC8E3;
  color: #0a1628;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 8px;
}
@media (max-width: 640px) {
  .jacket-cards { flex-direction: column; align-items: center; }
  .jacket-card { width: 100%; max-width: 320px; }
}

</style>
</head>

async function supaFetch(table, query) {
  const url = SUPABASE_URL + '/rest/v1/' + table + (query ? '?' + query : '');
  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  });
  return res.json();
}

async function supaInsert(table, data) {
  const url = SUPABASE_URL + '/rest/v1/' + table;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(data)
  });
  return res.json();
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

async function loadData() {
  const [referrers, signups] = await Promise.all([
    supaFetch('referrers', 'select=*&order=created_at.asc'),
    supaFetch('signups', 'select=*&order=created_at.desc')
  ]);

  const leads = referrers.filter(r => r.role === 'lead');
  const helpers = referrers.filter(r => r.role === 'helper');

  // Build team data
  const teams = leads.map(lead => {
    const teamHelpers = helpers.filter(h => h.parent_ref_code === lead.ref_code);
    const allCodes = [lead.ref_code, ...teamHelpers.map(h => h.ref_code)];
    const teamSignups = signups.filter(s => allCodes.includes(s.ref_code));

    return {
      lead,
      helpers: teamHelpers.map(h => ({
        ...h,
        count: signups.filter(s => s.ref_code === h.ref_code).length
      })),
      directCount: signups.filter(s => s.ref_code === lead.ref_code).length,
      totalCount: teamSignups.length
    };
  });

  // Sort: most signups first
  teams.sort((a, b) => b.totalCount - a.totalCount);

  render(teams, signups.slice(0, 10), referrers);
}

async function addHelper() {
  const parent = document.getElementById('parentTeam').value;
  const name = document.getElementById('helperName').value.trim();
  if (!name) { alert('Please enter a name'); return; }

  const refCode = parent + '-' + name.toLowerCase().replace(/[^a-z0-9]/g, '');

  try {
    await supaInsert('referrers', {
      name: name,
      role: 'helper',
      ref_code: refCode,
      parent_ref_code: parent
    });
    document.getElementById('helperName').value = '';
    loadData(); // Refresh
  } catch (e) {
    alert('Error adding partner: ' + e.message);
  }
}
