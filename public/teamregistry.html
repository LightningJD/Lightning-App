/* Auto-refresh indicator */

.jacket-showcase {

<script>
const SUPABASE_URL = 'https://wsyhpxnzsuxnylgqvcti.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzeWhweG56c3V4bnlsZ3F2Y3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4ODcxNDcsImV4cCI6MjA3NjQ2MzE0N30.9KgfzAVwf7gHrPYqTpo_TcZbJg_ori9vaHBf4MvAHz4';
const GOAL = 50;
const LANDING_URL = 'https://lightningsocial.app/landing';

async function supaFetch(table, query) {
  const url = SUPABASE_URL + '/rest/v1/' + table + (query ? '?' + query : '');
  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  });
  return res.json();
}

async function supaInsert(table, data) {
  const url = SUPABASE_URL + '/rest/v1/' + table;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(data)
  });
  return res.json();
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

async function loadData() {
  const [referrers, signups] = await Promise.all([
    supaFetch('referrers', 'select=*&order=created_at.asc'),
    supaFetch('signups', 'select=*&order=created_at.desc')
  ]);

  const leads = referrers.filter(r => r.role === 'lead');
  const helpers = referrers.filter(r => r.role === 'helper');

  // Build team data
  const teams = leads.map(lead => {
    const teamHelpers = helpers.filter(h => h.parent_ref_code === lead.ref_code);
    const allCodes = [lead.ref_code, ...teamHelpers.map(h => h.ref_code)];
    const teamSignups = signups.filter(s => allCodes.includes(s.ref_code));

    return {
      lead,
      helpers: teamHelpers.map(h => ({
        ...h,
        count: signups.filter(s => s.ref_code === h.ref_code).length
      })),
      directCount: signups.filter(s => s.ref_code === lead.ref_code).length,
      totalCount: teamSignups.length
    };
  });

  // Sort: most signups first
  teams.sort((a, b) => b.totalCount - a.totalCount);

  render(teams, signups.slice(0, 10), referrers);
}

function render(teams, recentSignups, allReferrers) {
  const app = document.getElementById('app');
  const maxCount = Math.max(...teams.map(t => t.totalCount), 1);
  const leadingTeam = teams[0];

  let html = '';

  // Header
  html += '<div class="header">';
  html += '<h1>\u26A1 Team Registry</h1>';
  html += '<p>Lightning signup &mdash; recruit friends, earn rewards</p>';
  html += '</div>';
  // Team cards
  html += '<div class="teams">';
  teams.forEach((team, i) => {
    const isLeading = i === 0 && team.totalCount > 0;
    const pct = Math.min((team.totalCount / GOAL) * 100, 100);
    
    html += '<div class="team-card' + (isLeading ? ' leading' : '') + '">';
    html += '<div class="team-header">';
    html += '<div class="team-name">' + team.lead.name + '</div>';
    if (isLeading && teams.length > 1 && team.totalCount > teams[1].totalCount) {
      html += '<span class="team-badge leader">Leading</span>';
    } else if (i > 0 && teams[i-1].totalCount > team.totalCount) {
      html += '<span class="team-badge trailing">Trailing</span>';
    }
    html += '</div>';

    html += '<div class="team-count">' + team.totalCount + '</div>';
    html += '<div class="team-count-label">total signups (' + team.directCount + ' direct)</div>';

    // Helpers
    html += '<div class="helpers-section">';
    html += '<div class="helpers-title">Team Partners</div>';
    if (team.helpers.length === 0) {
      html += '<div class="no-helpers">Partners will show here once added</div>';
    } else {
      team.helpers.forEach(h => {
        html += '<div class="helper-row">';
        html += '<span class="helper-name">' + h.name + '</span>';
        html += '<span class="helper-count">' + h.count + ' signups</span>';
        html += '</div>';
      });
    }
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

    // Jacket Showcase + Rewards Section
    html += '<div class="jacket-showcase">';
    html += '<h2>\u26A1 Team Reward</h2>';
    html += '<p class="showcase-subtitle" style="color:#FFD700;font-weight:600;font-size:1rem;">\u26A0\uFE0F Signups must create a profile on May 15th to qualify<br>&#x26A0;&#xFE0F; Signups must be from The Crossing Students (TCS) only (bring 2-3 friends to help you win and split the cash rewards)</p>';
    html += '<div class="jacket-cards">';
    html += '<a href="https://ruelleclub.com/products/product-1" target="_blank" class="jacket-card">';
    html += '<img src="/images/untitled-8.webp" alt="Twill Friend of God Jacket - Back">';
    html += '<div class="jacket-info">';
    html += '<h3>Twill Friend of God Jacket</h3>';
    html += '<p class="jacket-price"><span class="original">$145.00</span>$60.00<span class="jacket-sale">SALE</span></p>';
    html += '</div></a>';
    html += '<a href="https://ruelleclub.com/products/product-2" target="_blank" class="jacket-card">';
    html += '<img src="/images/untitled-18_170550e2-8e18-4039-9383-0dc45081d9c8.webp" alt="Varsity Friend of God Jacket - Back">';
    html += '<div class="jacket-info">';
    html += '<h3>Varsity Friend of God Jacket</h3>';
    html += '<p class="jacket-price"><span class="original">$145.00</span>$60.00<span class="jacket-sale">SALE</span></p>';
    html += '</div></a>';
    html += '</div>';
    html += '<div class="reward-tiers" style="margin-top:24px">';
    html += '<div class="reward-tier"><div class="tier-label">50+ SIGNUPS EACH</div><div class="tier-reward">Win Both Jackets + Next Release</div></div>';
    html += '<div class="reward-tier"><div class="tier-label">MOST SIGNUPS</div><div class="tier-reward">$200 Cash Prize</div></div>';
    html += '</div>';
  html += '</div>';

  // QR Codes
  html += '<div class="qr-section">';
  html += '<h3>Referral QR Codes</h3>';
  html += '<p>Scan to sign up &mdash; each code tracks who referred the signup</p>';
  html += '<div class="qr-grid">';
  allReferrers.forEach(r => {
    html += '<div class="qr-item">';
    html += '<canvas id="qr-' + r.ref_code + '" width="160" height="160"></canvas>';
    html += '<div class="qr-label">' + (r.role === 'lead' ? r.name + ' \u2014 Team Lead' : r.name) + '</div>';
    html += '<a class="qr-download" data-qrid="qr-' + r.ref_code + '" data-name="' + r.name + '">Save QR</a>';
    html += '</div>';
  });
  html += '</div>';
  html += '</div>';

  
    // Add helper form
  html += '<div class="add-helper-section">';
  html += '<h3>Add a Team Partner</h3>';
  html += '<div class="add-helper-form">';
  html += '<select id="parentTeam">';
  teams.forEach(t => {
    html += '<option value="' + t.lead.ref_code + '">Team ' + t.lead.name + '</option>';
  });
  html += '</select>';
  html += '<input type="text" id="helperName" placeholder="Partner name">';
  html += '<button onclick="addHelper()">Add Partner</button>';
  html += '</div>';
  html += '</div>';

  // Recent signups
  if (recentSignups.length > 0) {
    html += '<div class="recent-section">';
    html += '<h3>Recent Signups</h3>';
    html += '<div class="recent-list">';
    recentSignups.forEach(s => {
      const emailMasked = s.email.substring(0, 3) + '***@' + s.email.split('@')[1];
      html += '<div class="recent-item">';
      html += '<span class="recent-email">' + emailMasked + '</span>';
      html += '<span class="recent-ref">via ' + (s.ref_code || 'direct') + '</span>';
      html += '<span class="recent-time">' + timeAgo(s.created_at) + '</span>';
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
  }



  app.innerHTML = html;

  // Generate QR codes after DOM update
  setTimeout(() => {
    allReferrers.forEach(r => {
      const canvas = document.getElementById('qr-' + r.ref_code);
      if (canvas) {
        new QRious({
          element: canvas,
          value: LANDING_URL + '?ref=' + r.ref_code,
          size: 160,
          backgroundAlpha: 1,
          foreground: '#0a0a1a',
          background: '#ffffff',
          level: 'M'
        });

      // Download QR click handler
      document.querySelectorAll('.qr-download').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var canvas = document.getElementById(btn.getAttribute('data-qrid'));
          if (!canvas) return;
          var link = document.createElement('a');
          link.download = btn.getAttribute('data-name').replace(/\s+/g, '_') + '_QR.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        });
      });
      }
    });
  }, 100);
}

async function addHelper() {
  const parent = document.getElementById('parentTeam').value;
  const name = document.getElementById('helperName').value.trim();
  if (!name) { alert('Please enter a name'); return; }

  const refCode = parent + '-' + name.toLowerCase().replace(/[^a-z0-9]/g, '');

  try {
    await supaInsert('referrers', {
      name: name,
      role: 'helper',
      ref_code: refCode,
      parent_ref_code: parent
    });
    document.getElementById('helperName').value = '';
    loadData(); // Refresh
  } catch (e) {
    alert('Error adding partner: ' + e.message);
  }
}

// Initial load
loadData();

// Auto-refresh every 30 seconds
setInterval(loadData, 30000);
</script>
