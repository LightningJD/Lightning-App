<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lightning</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{width:1280px;height:720px;overflow:hidden;background:transparent;font-family:'Plus Jakarta Sans',sans-serif}
#stage{position:relative;width:1280px;height:720px;cursor:pointer}
#muteBtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;width:180px;height:180px;border-radius:50%;background:rgba(0,0,0,.4);border:2px solid rgba(240,244,248,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .5s,transform .5s}
#muteBtn:hover{background:rgba(0,0,0,.55)}
#muteBtn.hidden{opacity:0;pointer-events:none;transform:translate(-50%,-50%) scale(.8)}
#muteBtn svg{width:80px;height:80px;fill:rgba(240,244,248,.8)}
#progress{position:absolute;bottom:0;left:0;height:3px;background:#F0F4F8;width:0%;z-index:100}
#logo{position:absolute;top:24px;left:32px;display:flex;align-items:center;gap:8px;z-index:100;opacity:.3}
#logo span{font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#F0F4F8}
.scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s ease}
.scene.active{opacity:1;pointer-events:auto}
.caption{position:absolute;bottom:52px;left:60px;right:60px;text-align:center;font-size:26px;font-weight:700;color:#F0F4F8;letter-spacing:-.02em;line-height:1.45;opacity:0;transform:translateY(10px);transition:opacity .5s ease,transform .5s ease}
.caption.show{opacity:1;transform:translateY(0)}
.caption em{color:#FFE566;font-style:normal;display:inline-block}
.caption em.pulse{animation:kp .7s ease forwards}
@keyframes kp{0%{transform:scale(1)}40%{transform:scale(1.18)}70%{transform:scale(.96)}100%{transform:scale(1)}}
.ic{position:absolute;opacity:0;transform:scale(.25);transition:opacity .5s ease,transform .55s cubic-bezier(.34,1.4,.64,1)}.ic.pop{opacity:1;transform:scale(1)}
/* circle icon style */
.cicon{width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cicon-lg{width:220px;height:220px;border-radius:50%;display:flex;align-items:center;justify-content:center}

@keyframes punchSpin{0%{transform:scale(1) perspective(800px) rotateY(0deg)}30%{transform:scale(1.05) perspective(800px) rotateY(0deg)}100%{transform:scale(1) perspective(800px) rotateY(180deg);opacity:0}}
@keyframes spinIn{0%{transform:scale(1) perspective(800px) rotateY(-180deg);opacity:0}60%{transform:scale(1.05) perspective(800px) rotateY(-10deg);opacity:1}80%{transform:scale(1) perspective(800px) rotateY(5deg)}100%{transform:scale(1) perspective(800px) rotateY(0deg)}}.punch-out{animation:punchSpin .5s ease-in forwards}
.spin-in{animation:spinIn .6s cubic-bezier(.34,1.4,.64,1) forwards}
</style>
</head>
<body>

<script>
const TOTAL=56000;
const C7=['#FFE566','#FFB347','#FF6B6B','#FF8FAB','#B8B3FF','#7EC8E3','#6DEBB8'];
const T=[0,8218,12000,14600,17400,20200,22500,24700,27500,29250,34000,41650,45075,51500];

/* S3 fingers — now SVG-based, no canvas needed */

/* S6 circle icons */
(function(){
  const wrap=document.getElementById('s6wrap');
  const icons=[
    '<svg viewBox="0 0 40 56" width="40" height="56"><path d="M24 2L4 30H20L15 54L36 26H20L24 2Z" fill="#0a0a0a"/></svg>',
    '<svg viewBox="0 0 44 40" width="40" height="36"><path d="M22 38C22 38 2 26 2 14C2 6 8 0 16 0C20 0 22 3 22 3C22 3 24 0 28 0C36 0 42 6 42 14C42 26 22 38 22 38Z" fill="#0a0a0a"/></svg>',
    '<svg viewBox="0 0 36 50" width="30" height="42"><rect x="12" y="0" width="12" height="50" rx="4" fill="#0a0a0a"/><rect x="0" y="12" width="36" height="12" rx="4" fill="#0a0a0a"/></svg>',
    '<svg viewBox="0 0 40 52" width="34" height="44"><circle cx="20" cy="12" r="10" fill="#0a0a0a"/><path d="M4 50C4 36 36 36 36 50Z" fill="#0a0a0a"/></svg>',
    '<svg viewBox="0 0 44 42" width="38" height="36"><polygon points="22,2 27,16 42,16 30,26 34,40 22,32 10,40 14,26 2,16 17,16" fill="#0a0a0a"/></svg>',
    '<svg viewBox="0 0 48 52" width="36" height="40"><rect x="6" y="22" width="36" height="30" rx="2" fill="#0a0a0a"/><polygon points="24,4 6,24 42,24" fill="#0a0a0a"/><rect x="20" y="8" width="8" height="14" rx="2" fill="#0a0a0a"/><rect x="16" y="14" width="16" height="6" rx="2" fill="#0a0a0a"/></svg>',
    '<svg viewBox="0 0 40 46" width="34" height="40"><polygon points="20,2 38,14 38,32 20,44 2,32 2,14" fill="#0a0a0a"/></svg>'
  ];
  C7.forEach((col,i)=>{
    const d=document.createElement('div');d.className='ic';d.id='s6i'+i;
    d.style.cssText='position:relative';
    d.innerHTML='<div class="cicon" style="background:'+col+'">'+icons[i]+'</div>';
    wrap.appendChild(d);
  });
})();

/* S1-3 unified: Circles → Spark → Merge → Rings */
function makeOpening(){
  const cv=document.getElementById('s1cv'),cx=cv.getContext('2d');
  let r=null,st=null;
  // Phase timestamps (relative to scene start)
  const P1=3450;   // circles hold until here
  const P2=5200;   // spark + drift until here
  const P3=8718;   // merge into rings by here

  const R=110;     // circle/ring radius
  const CY=300;    // vertical center
  const farL=320,farR=960; // starting circle centers
  const overlap=80;        // final ring gap from center

  function drawPerson(x,y,r,alpha){
    // White circle with person silhouette
    cx.globalAlpha=alpha;
    cx.fillStyle='#F0F4F8';cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
    const s=r/110;
    cx.fillStyle='#0a0a0a';
    cx.beginPath();cx.arc(x,y-r*.25,22*s,0,Math.PI*2);cx.fill();
    cx.beginPath();
    cx.moveTo(x-40*s,y+r*.55);
    cx.quadraticCurveTo(x-40*s,y+r*.05,x,y+r*.05);
    cx.quadraticCurveTo(x+40*s,y+r*.05,x+40*s,y+r*.55);
    cx.closePath();cx.fill();
    cx.globalAlpha=1;
  }
  function drawCross(x,y,r,alpha){
    // White circle with cross
    cx.globalAlpha=alpha;
    cx.fillStyle='#FFFFFF';cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
    const s=r/110;
    cx.fillStyle='#0a0a0a';
    const bw=16*s,bh=80*s,rx2=6*s;
    cx.beginPath();cx.roundRect(x-bw/2,y-bh/2,bw,bh,rx2);cx.fill();
    cx.beginPath();cx.roundRect(x-30*s,y-bh/2+18*s,60*s,bw,rx2);cx.fill();
    cx.globalAlpha=1;
  }
  function drawBolt(x,y,scale,alpha){
    cx.globalAlpha=alpha;
    cx.fillStyle='#FFFFFF';
    cx.save();cx.translate(x,y);cx.scale(scale,scale);
    cx.beginPath();
    cx.moveTo(24,-52);cx.lineTo(-16,2);cx.lineTo(8,2);cx.lineTo(-2,52);cx.lineTo(38,-4);cx.lineTo(8,-4);cx.closePath();
    cx.fill();cx.restore();
    cx.globalAlpha=1;
  }

  return{start(totalDur){st=null;
    function lp(ts){if(!st)st=ts;const el=ts-st;cx.clearRect(0,0,1280,720);

    if(el<P1){
      // --- Phase 1: Two circles appear and hold ---
      const aL=Math.min(el/500,1);
      const aR=Math.min(Math.max((el-800)/500,0),1);
      const eL=1-Math.pow(1-aL,3);
      const eR=1-Math.pow(1-aR,3);
      drawPerson(farL,CY,R*eL,aL);
      drawCross(farR,CY,R*eR,aR);

    } else if(el<P2){
      // --- Phase 2: Bolt appears, circles start drifting closer ---
      const t=(el-P1)/(P2-P1);
      const drift=t*t*(3-2*t);
      const lx=farL+(640-overlap-farL)*drift;
      const rx=farR+(640+overlap-farR)*drift;

      // Person circle stays white
      // Draw person circle
      cx.globalAlpha=1;
      cx.fillStyle='#FFFFFF';cx.beginPath();cx.arc(lx,CY,R,0,Math.PI*2);cx.fill();
      const s=R/110;
      cx.fillStyle='#0a0a0a';
      cx.beginPath();cx.arc(lx,CY-R*.25,22*s,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.moveTo(lx-40*s,CY+R*.55);cx.quadraticCurveTo(lx-40*s,CY+R*.05,lx,CY+R*.05);cx.quadraticCurveTo(lx+40*s,CY+R*.05,lx+40*s,CY+R*.55);cx.closePath();cx.fill();
      drawCross(rx,CY,R,1);

      // Bolt flash
      const boltIn=Math.min(t/.15,1);
      const boltAlpha=boltIn*(t<.6?1:Math.max(1-(t-.6)/.4,0));
      const bScale=.8+boltIn*.6;
      drawBolt(640,CY,bScale,boltAlpha);

      // Flash glow at bolt appearance
      if(t<.2){
        const g=1-t/.2;
        cx.globalAlpha=g*.5;
        const grad=cx.createRadialGradient(640,CY,0,640,CY,180);
        grad.addColorStop(0,'rgba(240,244,248,.9)');grad.addColorStop(1,'rgba(240,244,248,0)');
        cx.fillStyle=grad;cx.beginPath();cx.arc(640,CY,180,0,Math.PI*2);cx.fill();
        cx.globalAlpha=1;
      }

    } else {
      // --- Phase 3: Merge into venn then rings ---
      const phaseDur=P3-P2;
      const t3=(el-P2)/phaseDur;
      const lx=640-overlap, rx=640+overlap;

      if(t3<.4){
        // Venn overlap — both white circles at final position, glow building
        cx.fillStyle='#FFFFFF';cx.beginPath();cx.arc(lx,CY,R,0,Math.PI*2);cx.fill();
        const s=R/110;cx.fillStyle='#0a0a0a';
        cx.beginPath();cx.arc(lx,CY-R*.25,22*s,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.moveTo(lx-40*s,CY+R*.55);cx.quadraticCurveTo(lx-40*s,CY+R*.05,lx,CY+R*.05);cx.quadraticCurveTo(lx+40*s,CY+R*.05,lx+40*s,CY+R*.55);cx.closePath();cx.fill();
        drawCross(rx,CY,R,1);
        const ga=t3/.4;
        cx.globalAlpha=ga*.4;
        const grad=cx.createRadialGradient(640,CY,0,640,CY,60);
        grad.addColorStop(0,'rgba(240,244,248,.8)');grad.addColorStop(1,'rgba(240,244,248,0)');
        cx.fillStyle=grad;cx.beginPath();cx.arc(640,CY,60,0,Math.PI*2);cx.fill();
        cx.globalAlpha=1;

      } else if(t3<.6){
        // Transition: fill fades, stroke rings appear
        const tt=(t3-.4)/.2;
        const ease=tt*tt*(3-2*tt);

      const gy=machY+machH/2+10;

    });
    const lightSpeed=machWorking?.025:.006;
    const lightOn=Math.sin(el*lightSpeed)>.2;
    cx.fillStyle=lightOn?'#6DEBB8':'#333';
    cx.beginPath();cx.arc(machX+machW/2-30,machY+16,5,0,Math.PI*2);cx.fill();
    cx.fillStyle=!lightOn?'#FFE566':'#333';
    cx.beginPath();cx.arc(machX+machW/2+30,machY+16,5,0,Math.PI*2);cx.fill();

    // Steam when rock is inside
    if(machWorking){
      const steamT=(el-1800)/1800;
      for(let i=0;i<4;i++){const age=((steamT*3+i*.25)%1);const sx=machX+machW/2-10+Math.sin(i*4+el*.003)*14;const sy=machY-78-age*80;const sr=8+age*18;
      cx.globalAlpha=(1-age)*.3;cx.fillStyle='#888';cx.beginPath();cx.arc(sx,sy,sr,0,Math.PI*2);cx.fill();}

    // --- SINGLE ROCK / GEM ---

      cx.save();cx.translate(shake,shake*.5);cx.restore();
    } else if(el<5100){
      isGem=true;
      const p=Math.min((el-3600)/1500,1);const ease=p*p*(3-2*p);
      rockX=exitMachX+(endX-exitMachX)*ease;

      isGem=true;rockX=endX;

      const pts=8;

      cx.fillStyle='#6e6e6e';cx.beginPath();
      for(let i=0;i<=pts;i++){const a=(i%pts)/pts*Math.PI*2;const jag=4+Math.sin(i*3.7)*6;

    if(isGem&&rockX!==undefined){
      cx.fillStyle='#6DEBB8';cx.beginPath();
      for(let i=0;i<=6;i++){const a=(i%6)/6*Math.PI*2-Math.PI/6;cx.lineTo(rockX+Math.cos(a)*sz,rockY+Math.sin(a)*sz);}

      cx.fillStyle='rgba(0,0,0,.12)';cx.beginPath();
      const a3=a0+Math.PI*2/6*3,a4=a0+Math.PI*2/6*4;
      cx.moveTo(rockX,rockY);cx.lineTo(rockX+Math.cos(a3)*sz,rockY+Math.sin(a3)*sz);cx.lineTo(rockX+Math.cos(a4)*sz,rockY+Math.sin(a4)*sz);cx.closePath();cx.fill();
      if(el>4200){
        const sparkles=[{ox:-sz*.4,oy:-sz*.5,phase:0},{ox:sz*.35,oy:-sz*.6,phase:0.33},{ox:sz*.5,oy:sz*.15,phase:0.66},{ox:-sz*.25,oy:sz*.4,phase:0.5},{ox:0,oy:-sz*.75,phase:0.17}];

        sparkles.forEach(s=>{const t=((el*.001)+s.phase)%1;const scale=.3+.7*Math.sin(t*Math.PI);

        const d=len*.55;cx.lineWidth=1.5*scale;
        cx.beginPath();cx.moveTo(shX-d,shY-d);cx.lineTo(shX+d,shY+d);cx.stroke();
        cx.beginPath();cx.moveTo(shX+d,shY-d);cx.lineTo(shX-d,shY+d);cx.stroke();});
        cx.globalAlpha=1;
      }
    }

    r=requestAnimationFrame(lp);}r=requestAnimationFrame(lp);},
  stop(){if(r)cancelAnimationFrame(r);document.getElementById('s14cv').getContext('2d').clearRect(0,0,1280,720);}};

/* S7 balloons — appear instantly, removed to reveal banner */
function makeBalloons(){
  const cv=document.getElementById('s7cv'),cx=cv.getContext('2d');
  let r=null,st=null;
  const groups=[
    {cx:180,cy:160},{cx:340,cy:120},{cx:480,cy:140},
    {cx:640,cy:110},{cx:800,cy:130},{cx:920,cy:150},{cx:1080,cy:125}
  ];
  const balloons=[];
  groups.forEach((g,gi)=>{
    for(let j=0;j<3;j++){
      balloons.push({
        x: g.cx + (j-1)*46 + (Math.random()-.5)*16,
        y: g.cy + (j-1)*36 + (Math.random()-.5)*16,
        col: C7[gi],
        rx: 34 + Math.random()*8,
        ry: 44 + Math.random()*10,
        phase: Math.random()*Math.PI*2
      });
    }
  });
  const REMOVE_AT=1000;
  const REMOVE_DUR=300;

  function drawBalloon(b,el){
    const y=b.y+Math.sin(el*.002+b.phase)*6;
    // After REMOVE_AT, shrink and fly up
    let scale=1, alpha=1, yOff=0;
    if(el>REMOVE_AT){
      const t=Math.min((el-REMOVE_AT)/REMOVE_DUR,1);
      const ease=t*t;
      scale=1-ease*.6;
      alpha=1-ease;
      yOff=-ease*120;
    }
    if(alpha<=0)return;
    cx.globalAlpha=alpha;
    // string
    cx.strokeStyle=b.col;cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(b.x,y+yOff+b.ry*scale+8);
    cx.quadraticCurveTo(b.x+3,y+yOff+b.ry*scale+40,b.x-2,y+yOff+b.ry*scale+70);cx.stroke();
    // balloon body
    cx.fillStyle=b.col;
    cx.beginPath();cx.ellipse(b.x,y+yOff,b.rx*scale,b.ry*scale,0,0,Math.PI*2);cx.fill();
    // tie
    cx.beginPath();cx.moveTo(b.x-4*scale,y+yOff+b.ry*scale);cx.lineTo(b.x+4*scale,y+yOff+b.ry*scale);
    cx.lineTo(b.x,y+yOff+b.ry*scale+8*scale);cx.closePath();cx.fill();
    // highlight
    cx.fillStyle='rgba(240,244,248,.22)';
    cx.beginPath();cx.ellipse(b.x-b.rx*.3,y+yOff-b.ry*.3,b.rx*.28*scale,b.ry*.35*scale,-.4,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
  }

  return{start(){st=null;function lp(ts){if(!st)st=ts;const el=ts-st;cx.clearRect(0,0,1280,720);
    if(el<REMOVE_AT+REMOVE_DUR) balloons.forEach(b=>drawBalloon(b,el));
    r=requestAnimationFrame(lp);}r=requestAnimationFrame(lp);},
  stop(){if(r)cancelAnimationFrame(r);cx.clearRect(0,0,1280,720);}};
}

/* S15 trees */
function makeTrees(){
  const cv=document.getElementById('s15cv'),cx=cv.getContext('2d');
  let r=null,st=null;
  const TD=[{x:640,y:560,h:180,cr:120},{x:260,y:580,h:150,cr:100},{x:420,y:575,h:160,cr:108},{x:860,y:575,h:155,cr:105},{x:1020,y:580,h:148,cr:98},{x:100,y:580,h:140,cr:92},{x:1160,y:578,h:142,cr:94}];
  const fc=['#FF6B6B','#FFB347','#FFE566','#FF8FAB','#B8B3FF','#7EC8E3','#6DEBB8'];
  function dT(x,y,h,cr,s,a){
    cx.globalAlpha=Math.min(a,1);
    cx.fillStyle='#6B4020';cx.beginPath();cx.roundRect(x-10,y-h*s,20,h*s,3);cx.fill();
    const c=cr*s;
    cx.fillStyle='#3a7020';cx.beginPath();cx.arc(x,y-h*s,c,0,Math.PI*2);cx.fill();
    cx.fillStyle='#4a8a28';cx.beginPath();cx.arc(x-c*.3,y-h*s-c*.2,c*.7,0,Math.PI*2);cx.fill();
    cx.fillStyle='#5a9a38';cx.beginPath();cx.arc(x+c*.2,y-h*s-c*.3,c*.6,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
  }
  return{start(){st=null;function lp(ts){if(!st)st=ts;const el=ts-st;cx.clearRect(0,0,1280,720);
    cx.fillStyle='#182410';cx.fillRect(0,558,1280,162);
    cx.fillStyle='#223818';cx.beginPath();cx.ellipse(640,562,720,30,0,0,Math.PI*2);cx.fill();
    const p1=Math.min(el/600,1);dT(640,560,180,120,1-Math.pow(1-p1,3),p1);
    for(let i=1;i<TD.length;i++){const t2=Math.max(0,Math.min((el-600-(i-1)*100)/400,1));if(t2>0)dT(TD[i].x,TD[i].y,TD[i].h,TD[i].cr,1-Math.pow(1-t2,3),t2);}
    if(el>1200){TD.forEach((td,ti)=>{
      const ft=Math.max(0,Math.min((el-1200-ti*80)/250,1));
      if(ft>0){[[-30,-20],[20,-36],[40,-8],[-18,6],[0,-44],[-42,-14]].forEach((o,oi)=>{
        cx.globalAlpha=ft;const bob=Math.sin(el*.002+ti*7+oi)*3;
        cx.fillStyle=fc[ti];cx.beginPath();cx.arc(td.x+o[0],td.y-td.h+o[1]+bob,8,0,Math.PI*2);cx.fill();
        cx.fillStyle='rgba(240,244,248,.25)';cx.beginPath();cx.arc(td.x+o[0]-3,td.y-td.h+o[1]+bob-3,3,0,Math.PI*2);cx.fill();
        // Subtle animated shine
        const sh=(.4+.6*Math.sin(el*.003+ti*2.1+oi*1.7))*.35;
        cx.globalAlpha=ft*sh;cx.strokeStyle='#F0F4F8';cx.lineWidth=1.2;
        const sx=td.x+o[0],sy=td.y-td.h+o[1]+bob-10;
        cx.beginPath();cx.moveTo(sx,sy-4);cx.lineTo(sx,sy+4);cx.stroke();
        cx.beginPath();cx.moveTo(sx-4,sy);cx.lineTo(sx+4,sy);cx.stroke();
        cx.globalAlpha=1;});}});}
    r=requestAnimationFrame(lp);}r=requestAnimationFrame(lp);},
  stop(){if(r)cancelAnimationFrame(r);cx.clearRect(0,0,1280,720);}};
}

/* S16 building — tall windows, proper architecture */
function makeBuilding(){
  const cv=document.getElementById('s16cv'),cx=cv.getContext('2d');
  let r2=null,st=null,wins=[];
  // Building dimensions
  const BX=290,BY=130,BW=700,BH=520;
  // Windows: tall and narrow (rotated 90° from before)
  const COLS=8,ROWS=5,WW=32,WH=64;
  const HG=(BW-80-COLS*WW)/(COLS+1),VG=(BH-160-ROWS*WH)/(ROWS+1);
  
  // Door dimensions for collision check
  const doorW=80,doorH=100,doorX=BX+BW/2-doorW/2,doorY=BY+BH-doorH;

  function bW(){wins=[];for(let row=0;row<ROWS;row++)for(let col=0;col<COLS;col++){
    const wx=BX+40+HG+col*(WW+HG),wy=BY+100+VG+row*(WH+VG);
    // Skip windows that overlap the door area
    if(wx+WW>doorX-6&&wx<doorX+doorW+6&&wy+WH>doorY-10) continue;
    // Light from bottom-up: bottom rows light first
    const distFromBottom=ROWS-1-row+Math.abs(col-COLS/2+.5)*0.4;
    wins.push({x:wx,y:wy,color:C7[Math.floor(Math.random()*7)],al:0,lit:false,
      delay:distFromBottom*350+Math.random()*300+100,
      ps:.5+Math.random()*1.6,po:Math.random()*Math.PI*2,nc:0});
  }}
  
  const DOOR_OPEN_START=3000;
  const DOOR_OPEN_DUR=1500;

  function drawBldg(el){
    // Ground
    cx.fillStyle='#333';cx.fillRect(0,BY+BH-10,1280,200);

    // Main building body
    cx.fillStyle='#1e1e1e';cx.beginPath();cx.roundRect(BX,BY,BW,BH,4);cx.fill();

    // Roof ledge / cornice
    cx.fillStyle='#2a2a2a';cx.fillRect(BX-8,BY-6,BW+16,18);
    cx.fillStyle='#303030';cx.fillRect(BX-4,BY-12,BW+8,10);

    // LIGHTNING text on rooftop
    cx.fillStyle='#F0F4F8';cx.font='bold 38px Outfit,sans-serif';cx.textAlign='center';cx.letterSpacing='8px';
    cx.fillText('WELCOME TO LIGHTNING',BX+BW/2,BY-24);
    cx.letterSpacing='0px';

    // Horizontal floor lines between window rows
    for(let r=1;r<=ROWS;r++){
      const ly=BY+100+VG*r+WH*(r-1)+VG*0.5-2;
      cx.fillStyle='#2a2a2a';cx.fillRect(BX+10,ly,BW-20,3);
    }

    // Vertical pilasters on sides
    cx.fillStyle='#252525';
    cx.fillRect(BX,BY,20,BH);
    cx.fillRect(BX+BW-20,BY,20,BH);

    // Entrance - door opening animation
    const doorOpen=el>DOOR_OPEN_START?Math.min((el-DOOR_OPEN_START)/DOOR_OPEN_DUR,1):0;
    const openEase=doorOpen*doorOpen*(3-2*doorOpen);

    // White rectangle behind door (visible as doors slide open)
    cx.fillStyle='#F0F4F8';
    cx.fillRect(doorX,doorY,doorW,doorH);

    // Left door panel — slides left as white rectangle
    const slideDist=doorW/2*openEase;
    cx.fillStyle='#F0F4F8';
    cx.fillRect(doorX-slideDist,doorY,doorW/2,doorH);
    // Right door panel — slides right as white rectangle
    cx.fillStyle='#F0F4F8';
    cx.fillRect(doorX+doorW/2+slideDist,doorY,doorW/2,doorH);

    // Door frame (always on top)
    cx.strokeStyle='#333';cx.lineWidth=3;cx.beginPath();cx.roundRect(doorX-2,doorY-2,doorW+4,doorH+4,6);cx.stroke();

    // Steps
    cx.fillStyle='#1e1e1e';
    cx.fillRect(doorX-16,doorY+doorH,doorW+32,10);
    cx.fillRect(doorX-28,doorY+doorH+10,doorW+56,10);

    // Address number above door
    cx.fillStyle='#333';cx.font='bold 16px Plus Jakarta Sans,sans-serif';cx.textAlign='center';
    cx.fillText('\u26A1',BX+BW/2,doorY-16);
  }
  
  return{start(){bW();st=null;function lp(ts){if(!st)st=ts;const el=ts-st;cx.clearRect(0,0,1280,720);
    drawBldg(el);
    const lightStart=1200;
    wins.forEach(w=>{
      // Window frame (always visible)
      cx.fillStyle='#0e0e0e';cx.beginPath();cx.roundRect(w.x-3,w.y-3,WW+6,WH+6,3);cx.fill();
      
      if(el<lightStart){
        cx.fillStyle='#1a1a1a';cx.beginPath();cx.roundRect(w.x,w.y,WW,WH,2);cx.fill();
        // Window cross bar
        cx.strokeStyle='#161616';cx.lineWidth=2;
        cx.beginPath();cx.moveTo(w.x+WW/2,w.y);cx.lineTo(w.x+WW/2,w.y+WH);cx.stroke();
        cx.beginPath();cx.moveTo(w.x,w.y+WH*0.4);cx.lineTo(w.x+WW,w.y+WH*0.4);cx.stroke();
        return;
      }
      const rel=el-lightStart;
      if(!w.lit&&rel>w.delay){w.lit=true;w.nc=rel+400+Math.random()*1400;}
      if(w.lit&&w.al<1)w.al=Math.min(w.al+.035,1);
      if(w.lit&&rel>w.nc){w.color=C7[Math.floor(Math.random()*7)];w.nc=rel+400+Math.random()*1400;}
      if(w.al>0){
        const pulse=.65+.35*Math.sin(el*.002*w.ps+w.po);
        // Lit window glow
        cx.globalAlpha=w.al*pulse;cx.fillStyle=w.color;cx.beginPath();cx.roundRect(w.x,w.y,WW,WH,2);cx.fill();
        // Window cross bar over lit window
        cx.globalAlpha=w.al*pulse*.4;cx.strokeStyle='#000';cx.lineWidth=2;
        cx.beginPath();cx.moveTo(w.x+WW/2,w.y);cx.lineTo(w.x+WW/2,w.y+WH);cx.stroke();
        cx.beginPath();cx.moveTo(w.x,w.y+WH*0.4);cx.lineTo(w.x+WW,w.y+WH*0.4);cx.stroke();
        // Top highlight
        cx.globalAlpha=w.al*pulse*.15;cx.fillStyle='#F0F4F8';cx.beginPath();cx.roundRect(w.x+2,w.y+2,WW-4,10,2);cx.fill();
      } else {
        cx.globalAlpha=1;cx.fillStyle='#1a1a1a';cx.beginPath();cx.roundRect(w.x,w.y,WW,WH,2);cx.fill();
        cx.strokeStyle='#161616';cx.lineWidth=2;
        cx.beginPath();cx.moveTo(w.x+WW/2,w.y);cx.lineTo(w.x+WW/2,w.y+WH);cx.stroke();
        cx.beginPath();cx.moveTo(w.x,w.y+WH*0.4);cx.lineTo(w.x+WW,w.y+WH*0.4);cx.stroke();
      }
      cx.globalAlpha=1;
    });
    r2=requestAnimationFrame(lp);}r2=requestAnimationFrame(lp);},
  stop(){if(r2)cancelAnimationFrame(r2);cx.clearRect(0,0,1280,720);}};
}

const refine=makeRefine();
const opening=makeOpening();
const balloons=makeBalloons();
const trees=makeTrees();
const building=makeBuilding();

const scenes=[
  {id:'s1',enter(){opening.start();},exit(){opening.stop();}},
  {id:'s4',enter(){setTimeout(()=>{const el=ge('s4name');el.textContent='LIGHTNING';el.style.opacity='1';el.style.clipPath='inset(0 0% 0 100%)';requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.transition='clip-path 5s cubic-bezier(.15,0,.05,1)';el.style.clipPath='inset(0 0% 0 0%)';}));},400);},exit(){const el=ge('s4name');if(el){el.style.opacity='0';el.style.clipPath='inset(0 0% 0 100%)';el.style.transition='';}}},
  {id:'s5',enter(){for(let i=0;i<7;i++)setTimeout(()=>pop('s5c'+i,0),i*120);},exit(){}},
  {id:'s6',enter(){for(let i=0;i<7;i++)setTimeout(()=>pop('s6i'+i,0),i*110);},exit(){}},
  {id:'s7',enter(){balloons.start();setTimeout(()=>pop('s7banner',0),1100);},exit(){balloons.stop();}},
  {id:'s8',enter(){pop('s8circle',0);},exit(){const c=ge('s8circle');if(c)c.classList.add('punch-out');}},
  {id:'s9',enter(){const c=ge('s9circle');if(c){c.style.opacity='1';c.style.transform='scale(1)';c.classList.add('spin-in');}},exit(){const c=ge('s9circle');if(c)c.classList.remove('spin-in');}},
  {id:'s10',enter(){pop('s10body',0);for(let i=0;i<7;i++)setTimeout(()=>pop('s10t'+i,0),400+i*140);},exit(){}},
  {id:'s11',enter(){
    const positions=[{r:-6},{r:3},{r:-2},{r:5},{r:4},{r:-5},{r:2}];
    for(let i=0;i<7;i++)setTimeout(()=>{
      const e=ge('s11c'+i);
      if(e){e.style.transition='opacity .5s ease,transform .55s cubic-bezier(.34,1.4,.64,1)';e.style.opacity='1';e.style.transform='scale(1) rotate('+positions[i].r+'deg)';}
    },i*130);
    
  },exit(){}},
  {id:'s12',enter(){pop('s12m',0);pop('s12wv',500);pop('s12w',900);},exit(){}},
  {id:'s14',enter(){refine.start();},exit(){refine.stop();}},
  {id:'s15',enter(){trees.start();},exit(){trees.stop();}},
  {id:'s16',enter(){building.start();},exit(){building.stop();}}
];

function ge(id){return document.getElementById(id)}
function pop(id,delay){setTimeout(()=>{const e=ge(id);if(e)e.classList.add('pop');},delay);}
function cap(id,delay){setTimeout(()=>{const e=ge(id);if(e)e.classList.add('show');},delay);}
function pem(cId,delay){setTimeout(()=>{const c=ge(cId);if(!c)return;const em=c.querySelector('em');if(!em)return;em.classList.remove('pulse');requestAnimationFrame(()=>requestAnimationFrame(()=>em.classList.add('pulse')));},delay);}

function hideAll(){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.ic').forEach(e=>{e.classList.remove('pop','punch-out','spin-in');e.style.opacity='';e.style.transform='';e.style.transition='opacity .5s ease,transform .55s cubic-bezier(.34,1.4,.64,1)';e.style.animation='';});
  document.querySelectorAll('.caption').forEach(c=>{c.classList.remove('show');const em=c.querySelector('em');if(em)em.classList.remove('pulse');});
  const sn=ge('s4name');if(sn){sn.style.opacity='0';sn.style.clipPath='inset(0 0% 0 100%)';sn.style.transition='';}
  const sp3=ge('s3spark');if(sp3)sp3.style.opacity='0';
}

let T0=null,cur=-1,raf=null;
function tick(ts){
  if(!T0)T0=ts;const el=ts-T0;
  ge('progress').style.width=Math.min(el/TOTAL*100,100)+'%';
  let active=-1;
  for(let i=0;i<scenes.length;i++){if(el>=T[i]&&el<T[i+1]){active=i;break;}}
  if(active!==cur&&active>=0){
    if(cur>=0&&scenes[cur].exit)scenes[cur].exit();
    hideAll();cur=active;
    ge(scenes[active].id).classList.add('active');
    scenes[active].enter();
  }
  if(el<TOTAL)raf=requestAnimationFrame(tick);
}
var isMuted=true;
function start(){
  if(raf)cancelAnimationFrame(raf);
  refine.stop();opening.stop();balloons.stop();trees.stop();building.stop();
  hideAll();T0=null;cur=-1;ge('progress').style.width='0%';
  raf=requestAnimationFrame(tick);
  var aud=document.getElementById('narration');
  if(aud){aud.currentTime=0;aud.muted=isMuted;aud.play().catch(function(){});}
  document.getElementById('muteBtn').title=isMuted?'Unmute':'Mute';
}
function toggleMute(){
  isMuted=!isMuted;
  var aud=document.getElementById('narration');
  if(aud){
    aud.muted=isMuted;
    if(!isMuted&&aud.paused){aud.play().catch(function(){});}
  }
  document.getElementById('muteIcon').style.display=isMuted?'block':'none';
  document.getElementById('unmuteIcon').style.display=isMuted?'none':'block';
  document.getElementById('muteBtn').title=isMuted?'Unmute':'Mute';
}
function unmuteAndRestart(){
  if(!isMuted)return;
  isMuted=false;
  document.getElementById('muteIcon').style.display='none';
  document.getElementById('unmuteIcon').style.display='block';
  document.getElementById('muteBtn').classList.add('hidden');
  start();
  document.removeEventListener('click',unmuteAndRestart);
}
document.addEventListener('click',unmuteAndRestart);
window.addEventListener('message',function(e){if(e.data==='unmute')unmuteAndRestart();});
window.addEventListener('load',()=>setTimeout(start,300));
document.getElementById('stage').addEventListener('click',function(){if(!isMuted)start();});
</script>
