<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mockup 3 — Tap-to-Select Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #cdd8f8 0%, #d6daf5 40%, #dee0f6 70%, #e4e0f5 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .wizard {
    width: 100%;
    max-width: 390px;
    background: linear-gradient(135deg, #cdd8f8 0%, #d6daf5 40%, #dee0f6 70%, #e4e0f5 100%);
    border-radius: 20px;
    border: 1px solid rgba(150,165,225,0.15);
    box-shadow: 0 25px 60px rgba(0,0,0,0.12);
    overflow: hidden;
  }
  .progress {
    display: flex;
    gap: 6px;
    justify-content: center;
    padding: 20px 24px 8px;
  }
  .dot { height: 8px; border-radius: 4px; }
  .dot.done { width: 8px; background: #4facfe; }
  .dot.active { width: 20px; background: #4facfe; }
  .dot.pending { width: 8px; background: rgba(150,165,225,0.15); }
  .hero {
    text-align: center;
    padding: 0 24px 12px;
  }
  .hero-icon { font-size: 24px; margin-bottom: 4px; }
  .hero h2 { font-size: 18px; font-weight: 600; color: #1e2b4a; }
  .hero p { font-size: 12px; color: #8e9ec0; margin-top: 2px; }
  .content { padding: 0 24px 12px; display: flex; flex-direction: column; gap: 14px; }

  /* Photo upload */
  .photo-section {
    text-align: center;
    padding: 20px;
    background: rgba(255,255,255,0.5);
    border-radius: 16px;
    border: 1px solid rgba(150,165,225,0.15);
  }
  .photo-section h3 {
    font-size: 12px;
    font-weight: 600;
    color: rgba(0,0,0,0.5);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .photo-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(79,172,254,0.08);
    border: 2px dashed rgba(79,172,254,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .photo-circle:hover {
    border-color: rgba(79,172,254,0.5);
    background: rgba(79,172,254,0.12);
  }
  .photo-circle .camera-icon {
    font-size: 28px;
    color: #4facfe;
  }
  .photo-hint {
    font-size: 11px;
    color: #8e9ec0;
  }

  /* Tappable info cards */
  .info-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .info-card {
    padding: 14px;
    background: rgba(255,255,255,0.5);
    border-radius: 14px;
    border: 1px solid rgba(150,165,225,0.15);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .info-card:hover { border-color: rgba(79,172,254,0.3); }
  .info-card.filled {
    border-color: rgba(79,172,254,0.3);
    background: rgba(79,172,254,0.06);
  }
  .info-card .card-icon {
    font-size: 20px;
    margin-bottom: 6px;
  }
  .info-card .card-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(0,0,0,0.45);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .info-card .card-value {
    font-size: 14px;
    font-weight: 500;
    color: #1e2b4a;
  }
  .info-card .card-placeholder {
    font-size: 13px;
    color: #8e9ec0;
  }
  .info-card .check {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4facfe, #3b82f6);
    color: white;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* Full-width card */
  .info-card.full {
    grid-column: 1 / -1;
  }

  /* Bio */
  .bio-card {
    background: rgba(255,255,255,0.5);
    border-radius: 14px;
    border: 1px solid rgba(150,165,225,0.15);
    padding: 14px;
  }
  .bio-card h3 {
    font-size: 12px;
    font-weight: 600;
    color: rgba(0,0,0,0.5);
    margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(150,165,225,0.15);
    background: rgba(255,255,255,0.5);
    color: #1e2b4a;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: none;
    height: 60px;
  }
  textarea:focus { border-color: rgba(79,172,254,0.4); }

  /* Completion badge */
  .completion {
    text-align: center;
    padding: 8px;
  }
  .completion-bar {
    height: 4px;
    background: rgba(150,165,225,0.15);
    border-radius: 2px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .completion-fill {
    height: 100%;
    width: 60%;
    background: linear-gradient(90deg, #4facfe, #3b82f6);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .completion-text {
    font-size: 11px;
    color: #8e9ec0;
    font-weight: 500;
  }

  .footer {
    padding: 8px 24px 20px;
    border-top: 1px solid rgba(150,165,225,0.15);
    display: flex;
    gap: 8px;
  }
  .btn-back {
    padding: 10px 16px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    background: transparent;
    border: 1px solid rgba(150,165,225,0.15);
    color: #4a5e88;
    cursor: pointer;
    flex: 1;
  }
  .btn-next {
    flex: 2;
    padding: 10px 16px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    color: white;
    border: none;
    background: linear-gradient(135deg, #4facfe, #3b82f6);
    box-shadow: 0 4px 12px rgba(79,172,254,0.25);
    cursor: pointer;
  }
  .skip-link {
    text-align: center;
    padding: 4px 24px 8px;
  }
  .skip-link a {
    font-size: 12px;
    color: #8e9ec0;
    text-decoration: none;
    font-weight: 500;
  }
  .approach-label {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,43,74,0.85);
    color: white;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    backdrop-filter: blur(8px);
    z-index: 10;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="approach-label">Mockup 3: Tap-to-Select Cards — Visual, minimal typing</div>

<div class="wizard">
  <div class="progress">
    <div class="dot done"></div>
    <div class="dot done"></div>
    <div class="dot active"></div>
    <div class="dot pending"></div>
  </div>

  <div class="hero">
    <div class="hero-icon">&#x2728;</div>
    <h2>Tell Us About You</h2>
    <p>Tap each card to fill in — all optional</p>
  </div>

  <div class="content">
    <!-- Profile Photo Upload -->
    <div class="photo-section">
      <h3>Profile Picture</h3>
      <div class="photo-circle">
        <span class="camera-icon">&#x1F4F7;</span>
      </div>
      <div class="photo-hint">Tap to upload a photo</div>
    </div>

    <!-- Bio -->
    <div class="bio-card">
      <h3>BIO</h3>
      <textarea placeholder="A few words about you and your faith..."></textarea>
    </div>

    <!-- Tappable profile cards -->
    <div class="info-cards">
      <div class="info-card filled">
        <div class="check">&#x2713;</div>
        <div class="card-icon">&#x1F48D;</div>
        <div class="card-label">Relationship</div>
        <div class="card-value">Married</div>
      </div>
      <div class="info-card filled">
        <div class="check">&#x2713;</div>
        <div class="card-icon">&#x1F4D6;</div>
        <div class="card-label">Favorite Verse</div>
        <div class="card-value">Phil. 4:13</div>
      </div>
    </div>

    <!-- Completion indicator -->
    <div class="completion">
      <div class="completion-bar">
        <div class="completion-fill" style="width: 80%;"></div>
      </div>
      <div class="completion-text">4 of 5 filled — looking great!</div>
    </div>
  </div>

  <div class="skip-link">
    <a href="#">Skip for now</a>
  </div>

  <div class="footer">
    <button class="btn-back">Previous</button>
    <button class="btn-next">Next</button>
  </div>
</div>

</body>
</html>
